<style>
#pwa-install-banner {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(135deg, #000000 0%, #1A1A1A 100%);
  color: #fff; padding: 14px 20px;

}
#pwa-install-banner.visible { transform: translateY(0); }
#pwa-install-banner .pwa-text { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
#pwa-install-banner .pwa-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
#pwa-install-banner .pwa-copy { flex: 1; min-width: 0; }
#pwa-install-banner .pwa-copy b { display: block; font-size: 14px; font-weight: 700; }
#pwa-install-banner .pwa-copy span { font-size: 12px; opacity: .8; }
#pwa-install-banner .pwa-actions { display: flex; gap: 8px; flex-shrink: 0; }
#pwa-btn-install {
  background: #fff; color: #000000; border-radius: 8px;
  padding: 9px 18px; font-weight: 700; font-size: 13px; border: none; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  font-family: inherit;
}
#pwa-btn-install:hover { transform: scale(1.04); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
#pwa-btn-dismiss {
  background: rgba(255,255,255,.15); color: #fff; border-radius: 8px;
  padding: 9px 14px; font-weight: 600; font-size: 13px; border: none; cursor: pointer;
  font-family: inherit;
}
#pwa-btn-dismiss:hover { background: rgba(255,255,255,.25); }
</style>

<div id="pwa-install-banner" role="banner" aria-label="Install SDGMart app">
  <div class="pwa-text">
    <div class="pwa-icon">🏪</div>
    <div class="pwa-copy">
      <b>Add SDGMart to your home screen</b>
      <span>Shop faster — works offline, no app store needed</span>
    </div>
  </div>
  <div class="pwa-actions">
    <button id="pwa-btn-install">Add to Home Screen</button>
    <button id="pwa-btn-dismiss">Not now</button>
  </div>
</div>

<script>
(function () {
  // Register the service worker. Required for background Web Push.
  // file:// can't register SWs and HTTP non-localhost can't either —
  // both fall back to in-page notifications via the Notification API.
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    navigator.serviceWorker.register('/sw.js').then(function (reg) {
      // Listen for SW → page messages (e.g. "user clicked a notification")
      navigator.serviceWorker.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'sdgmart-navigate') {
          // Soft navigation: if the URL is something like /?track=XYZ, signal the app.
          try {
            var u = new URL(e.data.url, location.origin);
            var trackId = u.searchParams.get('track');
            if (trackId) window.dispatchEvent(new CustomEvent('sdgmart:open-tracking', { detail: { orderId: trackId } }));
          } catch (_) {}
        }
      });
    }).catch(function (err) { console.warn('SW registration failed:', err); });
  }

  // PWA install prompt
  var deferredPrompt = null;
  var banner = document.getElementById('pwa-install-banner');
  var btnInstall = document.getElementById('pwa-btn-install');
  var btnDismiss = document.getElementById('pwa-btn-dismiss');

  // Only show if not already dismissed this session
  var dismissed = sessionStorage.getItem('pwa-dismissed');

  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferredPrompt = e;
    if (!dismissed) {
      setTimeout(function () {
        banner.classList.add('visible');
      }, 2000);
    }
  });

  btnInstall.addEventListener('click', function () {
    banner.classList.remove('visible');
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function (choice) {
        console.log('[PWA] Install choice:', choice.outcome);
        deferredPrompt = null;
      });
    }
  });

  btnDismiss.addEventListener('click', function () {
    banner.classList.remove('visible');
    sessionStorage.setItem('pwa-dismissed', '1');
  });

  // Hide banner if app already installed
  window.addEventListener('appinstalled', function () {
    banner.classList.remove('visible');
  });
})();
</script>
